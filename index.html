<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Domain Map — Werner Freight Estate</title>
<meta name="description" content="Interactive map of the Werner finance domain: 18 apps, flows, rules, and the V2 rebuild coverage.">
<style>:root{color-scheme:dark}html,body{margin:0;padding:0}img{max-width:100%}</style>
</head>
<body>
<style>
:root{
  --bg:#0a0d14; --bg2:#0f1420; --panel:#141b2b; --panel2:#1b2436; --line:#232f45; --line2:#2e3b56;
  --ink:#eef2f9; --ink2:#aab6cc; --ink3:#6c7a95;
  --gold:#e3a94e; --gold2:#f0c074; --cyan:#48d6e8; --cyan2:#8ce9f4; --violet:#8b7ff0;
  --good:#3ad29f; --good-bg:#123026; --warn:#e8b74e; --warn-bg:#332811; --crit:# f0664f;
  --crit:#f0664f; --crit-bg:#3a1712; --info:#5aa9e6;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --disp:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation-duration:.001s!important}}
a{color:var(--gold2);text-decoration:none}
code,.mono{font-family:var(--mono);font-size:.85em}

/* top bar */
.top{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:16px;padding:12px clamp(16px,4vw,44px);background:rgba(10,13,20,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.logo{font-family:var(--disp);font-weight:600;font-size:1.12rem;letter-spacing:.2px;color:#fff;white-space:nowrap}
.logo b{color:var(--gold)}
.topnav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
.topnav a{padding:6px 11px;border-radius:8px;color:var(--ink2);font-size:.82rem;font-weight:500}
.topnav a:hover{background:var(--panel2);color:#fff}
.topnav a.active{background:var(--gold);color:#0a0d14}
.tsearch{padding:7px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);font-size:.85rem;width:170px}
.tsearch:focus{outline:2px solid var(--gold);width:220px}
@media(max-width:820px){.topnav{display:none}.tsearch{width:120px}}
.bd-sm{display:none}
@media(max-width:640px){
  .top{gap:8px;padding:10px 14px}
  .logo{font-size:1rem}
  .tsearch{width:88px}.tsearch:focus{width:120px}
  .hero{height:calc(100svh - 49px);min-height:560px}
  .herobadge{display:none}
  .maptoggle{top:12px;left:12px;right:auto}
  .mt{font-size:.72rem;padding:7px 13px}
  .covlegend{top:56px;left:12px;right:auto;font-size:.62rem;gap:9px;padding:6px 10px;flex-wrap:wrap;max-width:calc(100% - 24px)}
  .maplegend{bottom:14px;left:12px;right:12px;font-size:.64rem;gap:10px;padding:7px 12px;justify-content:center}
  #nodeinfo{max-width:calc(100vw - 32px)}
}

/* hero — full-screen live map */
.hero{position:relative;height:calc(100vh - 53px);min-height:480px;border-bottom:1px solid var(--line);overflow:hidden}
#net{position:absolute;inset:0;width:100%;height:100%;display:block}
.herobadge{position:absolute;z-index:3;top:18px;left:clamp(16px,4vw,44px);display:inline-flex;align-items:center;gap:8px;font-size:.72rem;letter-spacing:.11em;text-transform:uppercase;color:var(--cyan2);border:1px solid var(--line2);background:rgba(20,27,43,.72);padding:6px 13px;border-radius:20px;font-weight:600;pointer-events:none;max-width:calc(100% - 30px)}
.maplegend{position:absolute;z-index:3;bottom:22px;left:clamp(16px,4vw,44px);display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:.74rem;color:var(--ink2);pointer-events:none;background:rgba(20,27,43,.78);border:1px solid var(--line2);border-radius:22px;padding:9px 17px}
.maplegend span{display:inline-flex;align-items:center;gap:7px}
.badge{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan2);border:1px solid var(--line2);background:rgba(20,27,43,.6);padding:5px 12px;border-radius:20px;font-weight:600}
.badge .pulse{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 0 rgba(72,214,232,.6);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(72,214,232,.5)}70%{box-shadow:0 0 0 9px rgba(72,214,232,0)}100%{box-shadow:0 0 0 0 rgba(72,214,232,0)}}
h1{font-family:var(--disp);font-weight:600;font-size:clamp(2.3rem,5.4vw,4rem);line-height:1.02;margin:.4em 0 .3em;letter-spacing:-.015em;color:#fff;text-wrap:balance}
h1 em{font-style:normal;color:var(--gold)}
.sub{font-size:clamp(1rem,1.6vw,1.22rem);color:var(--ink2);max-width:60ch}
.herohint{position:absolute;z-index:2;bottom:0;left:0;right:0;margin:0;padding:34px clamp(16px,4vw,44px) 16px;display:flex;gap:20px;flex-wrap:wrap;align-items:center;font-size:.78rem;color:var(--ink3);pointer-events:none;background:linear-gradient(0deg,var(--bg) 28%,transparent)}
.herohint b{color:var(--gold2);font-family:var(--disp);font-size:1.5rem;font-weight:600;font-variant-numeric:tabular-nums}
.herohint .stat{display:flex;flex-direction:column;line-height:1.15}
.legendrow{display:flex;gap:14px;flex-wrap:wrap;margin-left:auto}
.legendrow span{display:inline-flex;align-items:center;gap:6px}
.ld{width:10px;height:10px;border-radius:3px}

/* node detail popover */
#nodeinfo{position:absolute;z-index:5;max-width:260px;background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:12px 14px;box-shadow:0 20px 50px rgba(0,0,0,.55);pointer-events:none;opacity:0;transition:opacity .15s;font-size:.84rem}
#nodeinfo.on{opacity:1}
#nodeinfo h5{margin:0 0 3px;font-size:.95rem;color:#fff}
#nodeinfo .tag{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan2)}
#nodeinfo p{margin:6px 0 0;color:var(--ink2);font-size:.82rem}
.maptoggle{position:absolute;z-index:4;top:18px;right:clamp(16px,4vw,44px);display:flex;background:var(--panel);border:1px solid var(--line2);border-radius:10px;overflow:hidden;pointer-events:auto}
.mt{background:transparent;border:none;color:var(--ink2);font-size:.78rem;font-weight:600;padding:8px 15px;cursor:pointer;font-family:var(--sans)}
.mt.on{background:var(--gold);color:#0a0d14}
.covlegend{position:absolute;z-index:4;top:60px;right:clamp(16px,4vw,44px);display:none;gap:14px;background:rgba(20,27,43,.72);border:1px solid var(--line2);border-radius:9px;padding:7px 12px;font-size:.72rem;color:var(--ink2);pointer-events:none}
.covlegend.on{display:flex}
.covlegend span{display:inline-flex;align-items:center;gap:6px}
.covlegend i{width:9px;height:9px;border-radius:2px;display:inline-block}

/* sections */
main{max-width:1240px;margin:0 auto;padding:0 clamp(16px,4vw,44px)}
section{padding:64px 0;border-bottom:1px solid var(--line)}
.eyebrow{font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
h2{font-family:var(--disp);font-weight:600;font-size:clamp(1.7rem,3vw,2.4rem);margin:.25em 0 .1em;color:#fff;letter-spacing:-.01em;text-wrap:balance}
.lead{color:var(--ink2);max-width:74ch;font-size:1.05rem;margin:.5em 0 1.6em}
h3{font-size:1.05rem;color:#fff;margin:26px 0 12px;font-weight:700}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:18px 20px;transition:border-color .2s,transform .2s}
.card:hover{border-color:var(--line2);transform:translateY(-2px)}
.card h4{margin:0 0 5px;font-size:1.02rem;color:#fff}
.card .meta{font-size:.76rem;color:var(--gold2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.card p{font-size:.9rem;color:var(--ink2);margin:.35em 0}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.c-built{background:var(--good-bg);color:var(--good)} .c-partial{background:var(--warn-bg);color:var(--warn)}
.c-none{background:var(--crit-bg);color:var(--crit)} .c-planned{background:#1a2440;color:var(--info)}
.c-navy{background:#1a2440;color:var(--cyan2)} .c-gold{background:#332811;color:var(--gold2)}

/* coverage matrix */
.cov-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.cbtn{padding:7px 13px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink2);font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px}
.cbtn .d{width:9px;height:9px;border-radius:50%}
.cbtn.on{background:var(--panel2);color:#fff;border-color:var(--gold)}
.covgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.cov{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:12px;padding:13px 15px;transition:.2s}
.cov.built{border-left-color:var(--good)} .cov.partial{border-left-color:var(--warn)}
.cov.none{border-left-color:var(--crit)} .cov.planned{border-left-color:var(--info)}
.cov h4{margin:0 0 6px;font-size:.94rem;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:8px}
.cov p{margin:0;font-size:.8rem;color:var(--ink3)}
.cov .v2{font-size:.78rem;color:var(--ink2);margin-top:6px}
.cov .v2 b{color:var(--ink)}
.covbar{display:flex;height:10px;border-radius:6px;overflow:hidden;margin:2px 0 20px;border:1px solid var(--line)}
.covbar span{display:block}

/* expandable */
details.x{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin:10px 0;overflow:hidden}
details.x>summary{list-style:none;cursor:pointer;padding:15px 18px;display:flex;gap:12px;align-items:center;font-weight:600;color:#fff}
details.x>summary::-webkit-details-marker{display:none}
details.x>summary .tw{margin-left:auto;color:var(--gold);font-size:1.2rem;transition:transform .2s;flex:none}
details.x[open]>summary .tw{transform:rotate(45deg)}
details.x>summary .lbl{font-family:var(--mono);font-size:.66rem;padding:3px 8px;border-radius:6px;background:var(--bg2);color:var(--ink3);flex:none}
details.x .body{padding:2px 18px 18px;border-top:1px solid var(--line);color:var(--ink2);font-size:.92rem}
details.x .body ul{padding-left:1.15em;margin:.5em 0}
details.x .body li{margin:.3em 0}
details.x .body code{background:var(--bg2);padding:.1em .4em;border-radius:5px;color:var(--cyan2)}
.flow{display:flex;overflow-x:auto;gap:0;padding:8px 0 14px}
.fn{flex:none;min-width:112px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:9px 12px}
.fn .ft{font-size:.8rem;font-weight:700;color:#fff}
.fn .fs{font-size:.66rem;color:var(--ink3);font-family:var(--mono)}
.fn.src{border-color:var(--cyan)} .fn.sink{border-color:var(--gold)}
.far{align-self:center;color:var(--gold);padding:0 4px;flex:none}
.steps{counter-reset:s;list-style:none;padding:0}
.steps li{counter-increment:s;position:relative;padding:6px 0 6px 32px;border-left:1px solid var(--line2);margin-left:9px}
.steps li::before{content:counter(s);position:absolute;left:-12px;top:5px;width:23px;height:23px;border-radius:50%;background:var(--panel2);border:1px solid var(--gold);color:var(--gold2);font-size:.7rem;font-weight:700;display:grid;place-items:center;font-family:var(--mono)}
.note{border-left:2px solid var(--gold);background:rgba(227,169,78,.07);border-radius:0 8px 8px 0;padding:10px 14px;margin:12px 0;font-size:.88rem;color:var(--gold2)}
.note.crit{border-color:var(--crit);background:rgba(240,102,79,.08);color:#f4a291}
.src{font-size:.7rem;color:var(--ink3);font-family:var(--mono)}
.tw-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:14px}
table{border-collapse:collapse;width:100%;font-size:.85rem}
th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:top}
th{background:var(--bg2);color:var(--ink2);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
tbody tr:hover{background:var(--panel2)}
.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.fbar input{flex:1;min-width:180px;padding:9px 13px;border:1px solid var(--line2);border-radius:9px;background:var(--bg2);color:var(--ink);font-size:.88rem}
.pill{font-family:var(--mono);font-size:.72rem;padding:4px 10px;border-radius:7px;background:var(--bg2);border:1px solid var(--line2);cursor:pointer;color:var(--ink2)}
.pill.on{background:var(--gold);color:#0a0d14;border-color:var(--gold)}
.hidden{display:none!important}
.foot{padding:50px 0 40px;color:var(--ink3);font-size:.8rem;max-width:80ch}
mark{background:rgba(227,169,78,.28);color:#fff;border-radius:3px;padding:0 2px}
</style>

<div class="top">
  <div class="logo">Finance Domain <b>Map</b></div>
  <nav class="topnav" id="topnav"></nav>
  <input id="q" class="tsearch" type="search" placeholder="Search…" aria-label="Search">
</div>

<header class="hero">
  <canvas id="net"></canvas>
  <div class="herobadge"><span class="pulse"></span><b class="bd-lg">Werner freight estate · 18 apps · hover a node, click to inspect</b><b class="bd-sm">Tap a node to inspect</b></div>
  <div id="nodeinfo"></div>
  <div class="maptoggle" id="maptoggle"><button class="mt on" data-m="cur">Current estate</button><button class="mt" data-m="v2">V2 coverage</button></div>
  <div class="covlegend" id="covlegend"><span><i style="background:#3ad29f"></i>built in V2</span><span><i style="background:#e8b74e"></i>partial</span><span><i style="background:#f0664f"></i>no V2 equivalent</span></div>
  <div class="maplegend">
    <span><i class="ld" style="background:var(--cyan)"></i>source</span>
    <span><i class="ld" style="background:var(--gold)"></i>Werner app / engine</span>
    <span><i class="ld" style="background:var(--violet)"></i>destination</span>
  </div>
</header>

<main id="content"></main>
<div class="foot" id="foot"></div>

<script>
/* ============ NETWORK MAP ============ */
const NODES=[
 // col 0 sources
 {id:"mm",l:"MasterMind",c:0,t:"src",d:"The TMS. Source of truth for orders, routes, invoices, vouchers."},
 {id:"as400",l:"AS400 / iSeries",c:0,t:"src",d:"Legacy trip/split revenue, credit & bank files (jt400 RPG calls)."},
 {id:"psoft",l:"PeopleSoft",c:0,t:"src",d:"Legacy ERP still fed billing/PO staging via TPA."},
 {id:"sf",l:"Salesforce / CCSF",c:0,t:"src",d:"Customer master feed + work orders."},
 {id:"mkt",l:"Greenscreens / DAT",c:0,t:"src",d:"Market rate feeds powering freight pricing."},
 {id:"xig",l:"Xignite",c:0,t:"src",d:"Real-time FX rates."},
 // col 1 werner
 {id:"ar",l:"AR — app-accounting",c:1,t:"app",d:"Customer invoicing hub; incident engine; alert channels."},
 {id:"ap",l:"AP — accounting-payable",c:1,t:"app",d:"Carrier voucher 19-state machine."},
 {id:"ven",l:"Vendor — app-finance",c:1,t:"app",d:"Supplier creation into Workday (mostly disabled)."},
 {id:"bre",l:"BRE — allocation + routing",c:1,t:"eng",d:"Revenue/cost allocation + EDI routing engines."},
 {id:"price",l:"Freight pricing engine",c:1,t:"eng",d:"Buy/sell rate quoting from market data — dormant."},
 {id:"recon",l:"Reconciliation",c:1,t:"eng",d:"AS400 ↔ MasterMind revenue reconciliation (Mule)."},
 {id:"mds",l:"mastery-datasync",c:1,t:"app",d:"MM↔PeopleSoft sync, external-flip, transform API, rule data."},
 {id:"mule",l:"MuleSoft tier",c:1,t:"app",d:"10 apps: FX, assets, bank files, bridging, reconciliation."},
 // col 2 sinks
 {id:"wd",l:"Workday",c:2,t:"sink",d:"Strategic ERP — invoices, AP, suppliers, FX, assets."},
 {id:"plq",l:"PartnerLinQ",c:2,t:"sink",d:"EDI-210 to customers."},
 {id:"esk",l:"Esker",c:2,t:"sink",d:"AR / cash-collection SaaS (daily CSV)."},
 {id:"snow",l:"Snowflake",c:2,t:"sink",d:"Analytics warehouse."},
 {id:"tpay",l:"TriumphPay",c:2,t:"sink",d:"Carrier payment platform."},
 {id:"bank",l:"Banks · BMO/GXS",c:2,t:"sink",d:"Positive-pay, disbursement & returns files."}
];
const EDGES=[
 ["mm","ar"],["mm","ap"],["mm","mds"],["mm","ven"],
 ["as400","recon"],["as400","bre"],["psoft","mule"],["psoft","mds"],
 ["sf","ar"],["sf","mule"],["mkt","price"],["xig","mule"],
 ["ar","bre"],["ap","bre"],["ap","ven"],["bre","ar"],["bre","ap"],
 ["ar","wd"],["ar","plq"],["ar","esk"],["ar","snow"],
 ["ap","wd"],["ven","wd"],["ap","tpay"],
 ["recon","as400"],["mds","psoft"],["mule","wd"],["mule","bank"],["mule","psoft"]
];
const NT={src:"#48d6e8",app:"#e3a94e",eng:"#f0c074",sink:"#8b7ff0"};
const COVMAP={mm:"built",as400:"partial",psoft:"none",sf:"none",mkt:"none",xig:"none",ar:"built",ap:"built",ven:"built",bre:"built",price:"none",recon:"none",mds:"partial",mule:"none",wd:"built",plq:"partial",esk:"partial",snow:"partial",tpay:"partial",bank:"none"};
const COVCOL={built:"#3ad29f",partial:"#e8b74e",none:"#f0664f",planned:"#5aa9e6"};
let v2mode=false;
const cv=document.getElementById("net"),ctx=cv.getContext("2d"),info=document.getElementById("nodeinfo");
let W,H,DPR,pos={},parts=[],hover=null,sel=null,reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
function layout(){
  DPR=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
  const mob=W<640;
  const cols=[0,1,2],colX=mob?[W*0.115,W*0.5,W*0.885]:[W*0.13,W*0.5,W*0.87];
  cols.forEach(c=>{const ns=NODES.filter(n=>n.c===c);const top=H*(mob?0.20:0.15),bot=H*(mob?0.90:0.84),step=(bot-top)/Math.max(ns.length-1,1);
    ns.forEach((n,i)=>{pos[n.id]={x:colX[c],y:ns.length===1?(top+bot)/2:top+i*step}})});
  parts=[];EDGES.forEach((e,i)=>{const dormant=(e[0]==="mkt"||e[1]==="price");const n=dormant?1:2;
    for(let k=0;k<n;k++)parts.push({e:i,t:(k/n)+Math.sin(i*13.7)*0.1,sp:0.0016+((i*7)%5)*0.0004,dormant})});
}
function nodeAt(mx,my){for(const n of NODES){const p=pos[n.id];
  if(Math.hypot(mx-p.x,my-p.y)<24)return n;
  const w=n.l.length*6.7+12,ly=(n.c===1?p.y-16:p.y+4);let lx0,lx1;
  if(n.c===2){lx1=p.x-13;lx0=lx1-w}else if(n.c===0){lx0=p.x+13;lx1=lx0+w}else{lx0=p.x-w/2;lx1=p.x+w/2}
  if(mx>=lx0&&mx<=lx1&&my>=ly-14&&my<=ly+7)return n}
  return null}
function draw(){
  ctx.clearRect(0,0,W,H);
  const active=sel||hover;
  const lit=new Set();if(active){lit.add(active.id);EDGES.forEach(e=>{if(e[0]===active.id)lit.add(e[1]);if(e[1]===active.id)lit.add(e[0])})}
  // edges
  EDGES.forEach((e,i)=>{const a=pos[e[0]],b=pos[e[1]];const dormant=(e[0]==="mkt"||e[1]==="price")||(v2mode&&(COVMAP[e[0]]==="none"||COVMAP[e[1]]==="none"));
    const on=active&&(e[0]===active.id||e[1]===active.id);
    const mx=(a.x+b.x)/2;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.bezierCurveTo(mx,a.y,mx,b.y,b.x,b.y);
    ctx.strokeStyle=on?"rgba(227,169,78,.55)":dormant?"rgba(120,130,150,.10)":active?"rgba(90,105,135,.10)":"rgba(90,105,135,.22)";
    ctx.lineWidth=on?1.6:1;ctx.stroke()});
  // particles
  parts.forEach(pt=>{const e=EDGES[pt.e],a=pos[e[0]],b=pos[e[1]];if(!reduce)pt.t+=pt.sp;if(pt.t>1)pt.t-=1;
    const t=pt.t,mt=1-t,mx=(a.x+b.x)/2;
    const x=mt*mt*mt*a.x+3*mt*mt*t*mx+3*mt*t*t*mx+t*t*t*b.x;
    const y=mt*mt*mt*a.y+3*mt*mt*t*a.y+3*mt*t*t*b.y+t*t*t*b.y;
    const on=active&&(e[0]===active.id||e[1]===active.id);
    if(active&&!on)return;
